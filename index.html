const db = new Dexie("HifdhDB");
db.version(1).stores({
  surahs:   "n",    // memorised surah cards: n, interval, ef, reps, nextReview, added, lastReview
  settings: "key"   // key/value store: quiz cache
});

async function dbLoadMem() {
  const rows = await db.surahs.toArray();
  return Object.fromEntries(rows.map(r => [r.n, r]));
}
async function dbPutSurah(n, card)    { await db.surahs.put({ ...card, n }); }
async function dbDeleteSurah(n)       { await db.surahs.delete(n); }
async function dbGetSetting(key)      { const r = await db.settings.get(key); return r?.value ?? null; }

// ── SM-2 ──────────────────────────────────────────────────────────────────────
function sm2(card, q) {
  let { interval=1, ef=2.5, reps=0 } = card;
  if (q >= 3) {
    interval = reps===0?1:reps===1?6:Math.round(interval*ef);
    ef = Math.max(1.3, ef+0.1-(5-q)*(0.08+(5-q)*0.02));
    reps++;
  } else { reps=0; interval=1; }
  const next = new Date();
  next.setDate(next.getDate()+interval);
  return { interval, ef, reps, nextReview: next.toISOString().split("T")[0] };
}

const todayStr  = () => new Date().toISOString().split("T")[0];
const daysUntil = d  => Math.ceil((new Date(d)-new Date(todayStr()))/86400000);
const pick      = a  => a[Math.floor(Math.random()*a.length)];
const shuffle   = a  => [...a].sort(()=>Math.random()-0.5);
const trunc     = (s,n) => s.length>n ? s.slice(0,n).trim()+"…" : s;

// ── Verse cache (in-memory, avoids repeat API hits) ──────────────────────────
const verseCache = {};
async function fetchSurah(n) {
  if (verseCache[n]) return verseCache[n];
  const r = await fetch(`https://api.alquran.cloud/v1/surah/${n}/en.hilali`);
  const d = await r.json();
  const ayahs = d.data.ayahs.map(a => ({
    num: a.numberInSurah,
    text: a.text.replace(/\s*\[.*?\]/g,"").trim()
  }));
  verseCache[n] = ayahs;
  return ayahs;
}

// ── Quiz builder ──────────────────────────────────────────────────────────────
async function buildQuiz(memorizedNums) {
  const type = pick(["next_verse","identify_surah","surah_meaning","creative"]);

  if (type === "surah_meaning") {
    const s = SURAHS[pick(memorizedNums)-1];
    const distractors = shuffle(SURAHS.filter(x=>x.n!==s.n)).slice(0,3).map(x=>x.meaning);
    const opts = shuffle([s.meaning,...distractors]);
    const ans = ["a","b","c","d"][opts.indexOf(s.meaning)];
    return { type, question:`What is the meaning of the name "${s.en}" (${s.ar})?`,
      options:{a:opts[0],b:opts[1],c:opts[2],d:opts[3]}, answer:ans,
      explanation:`"${s.en}" means "${s.meaning}". It is Surah ${s.n} with ${s.v} verses in Juz ${s.j}.` };
  }

  if (type === "creative") {
    const mode = pick(["verse_count","juz","order"]);
    const s = SURAHS[pick(memorizedNums)-1];
    if (mode === "verse_count") {
      const wrongs = shuffle([s.v-1,s.v+1,s.v+3,s.v-3,s.v+5].filter(x=>x>0&&x!==s.v)).slice(0,3);
      const opts = shuffle([s.v,...wrongs]);
      const ans = ["a","b","c","d"][opts.indexOf(s.v)];
      return { type, question:`How many verses does Surah ${s.en} (${s.ar}) contain?`,
        options:{a:String(opts[0]),b:String(opts[1]),c:String(opts[2]),d:String(opts[3])}, answer:ans,
        explanation:`Surah ${s.en} contains ${s.v} verses. It is Surah number ${s.n} in the Quran.` };
    }
    if (mode === "juz") {
      const wrongs = shuffle([s.j-1,s.j+1,s.j+2,s.j-2].filter(x=>x>=1&&x<=30&&x!==s.j)).concat([1,5,15,20,29]).filter((x,i,a)=>x!==s.j&&a.indexOf(x)===i).slice(0,3);
      const opts = shuffle([s.j,...wrongs.slice(0,3)]);
      const ans = ["a","b","c","d"][opts.indexOf(s.j)];
      return { type, question:`In which Juz is Surah ${s.en} (${s.ar}) found?`,
        options:{a:`Juz ${opts[0]}`,b:`Juz ${opts[1]}`,c:`Juz ${opts[2]}`,d:`Juz ${opts[3]}`}, answer:ans,
        explanation:`Surah ${s.en} is in Juz ${s.j}. It has ${s.v} verses and is Surah number ${s.n}.` };
    }
    // order question
    if (s.n <= 1) return buildQuiz(memorizedNums);
    const prev = SURAHS[s.n-2];
    const others = shuffle(memorizedNums.filter(x=>x!==s.n)).slice(0,3).map(x=>SURAHS[x-1]);
    if (others.length < 3) return buildQuiz(memorizedNums);
    const pool = shuffle([s,...others]);
    const ans = ["a","b","c","d"][pool.indexOf(s)];
    return { type, question:`Which surah comes directly after Surah ${prev.en} (${prev.ar}) in the Quran?`,
      options:{a:pool[0].en,b:pool[1].en,c:pool[2].en,d:pool[3].en}, answer:ans,
      explanation:`Surah ${s.en} (${s.ar}) is number ${s.n}, following Surah ${prev.en}.` };
  }

  // next_verse and identify_surah need real verse data
  const surahNum = pick(memorizedNums);
  const s = SURAHS[surahNum-1];
  const ayahs = await fetchSurah(surahNum);

  if (type === "next_verse" && ayahs.length > 2) {
    const idx = Math.floor(Math.random()*(ayahs.length-1));
    const cur = ayahs[idx], nxt = ayahs[idx+1];
    let distractors = ayahs.filter((_,i)=>i!==idx+1&&i!==idx).map(a=>a.text);
    if (distractors.length < 3) {
      try {
        const other = pick(memorizedNums.filter(x=>x!==surahNum));
        const otherAyahs = await fetchSurah(other);
        distractors = [...distractors, ...otherAyahs.map(a=>a.text)];
      } catch {}
    }
    const wrongOpts = shuffle(distractors).slice(0,3).map(t=>trunc(t,120));
    const correct = trunc(nxt.text,120);
    const opts = shuffle([correct,...wrongOpts]);
    const ans = ["a","b","c","d"][opts.indexOf(correct)];
    return { type, question:`In Surah ${s.en}, verse ${cur.num} (Hilali & Khan):\n\n"${trunc(cur.text,140)}"\n\nWhat comes next — verse ${nxt.num}?`,
      options:{a:opts[0],b:opts[1],c:opts[2],d:opts[3]}, answer:ans,
      explanation:`Verse ${nxt.num} of Surah ${s.en} (${s.ar}) follows directly after verse ${cur.num}.` };
  }

  // identify_surah
  const ayah = pick(ayahs);
  let otherNums = shuffle(memorizedNums.filter(x=>x!==surahNum)).slice(0,3);
  while (otherNums.length < 3) {
    const r = Math.floor(Math.random()*114)+1;
    if (!otherNums.includes(r) && r!==surahNum) otherNums.push(r);
  }
  const others = otherNums.slice(0,3).map(x=>SURAHS[x-1].en);
  const opts = shuffle([s.en,...others]);
  const ans = ["a","b","c","d"][opts.indexOf(s.en)];
  return { type, question:`Which surah does this verse come from (Hilali & Khan)?\n\n"${trunc(ayah.text,160)}"`,
    options:{a:opts[0],b:opts[1],c:opts[2],d:opts[3]}, answer:ans,
    explanation:`This is verse ${ayah.num} of Surah ${s.en} (${s.ar}), meaning "${s.meaning}". It is Surah ${s.n} in Juz ${s.j}.` };
}

  const [reviewDone,setReviewDone]= useState(null);
  const [search,    setSearch]    = useState("");
  const [juzF,      setJuzF]      = useState(null);
  const [toast,     setToast]     = useState(null);
  const [ready,     setReady]     = useState(false);

  // ── Boot: load from Dexie ────────────────────────────────────────────────
  useEffect(() => {
    (async () => {
      const [memData, quizData] = await Promise.all([
        dbLoadMem(),
        dbGetSetting("quiz")
      ]);
      setMem(memData);
      if (quizData && quizData.date === todayStr()) {
        setQuiz(quizData.data);
        setAnswered(quizData.answered ?? null);
      }
      setReady(true);
    })();
  }, []);

  const notify = (msg, type="ok") => { setToast({msg,type}); setTimeout(()=>setToast(null),2500); };

  const nums = Object.keys(mem).map(Number);
  const due  = nums.filter(n => !mem[n].nextReview || mem[n].nextReview <= todayStr());

  // ── Surah CRUD ───────────────────────────────────────────────────────────
  const addSurah = async n => {
    const card = { interval:1, ef:2.5, reps:0, nextReview:todayStr(), added:todayStr() };
    await dbPutSurah(n, card);
    setMem(m => ({ ...m, [n]: card }));
    notify(`${SURAHS[n-1].en} added!`);
  };

  const removeSurah = async n => {
    await dbDeleteSurah(n);
    setMem(m => { const m2={...m}; delete m2[n]; return m2; });
    notify("Removed","info");
  };

  // ── Review ───────────────────────────────────────────────────────────────
  const doReview = async (n, q) => {
    const updated = { ...mem[n], ...sm2(mem[n]||{}, q), lastReview:todayStr() };
    await dbPutSurah(n, updated);
    setMem(m => ({ ...m, [n]: updated }));
    setReviewDone({ q, next:updated.nextReview, interval:updated.interval });
  };

  // ── Quiz ─────────────────────────────────────────────────────────────────
  const genQuiz = async () => {
    if (!nums.length) return;
    setLoading(true); setQuiz(null); setAnswered(null);
    try {
      const q = await buildQuiz(nums);
      setQuiz(q);
      await dbPutSetting("quiz", { date:todayStr(), data:q, answered:null });
    } catch(e) {
      setQuiz({ error:true, question:"Could not load question. Check your internet connection.",
        options:{a:"",b:"",c:"",d:""}, answer:"a", explanation:"" });
    }
    setLoading(false);
  };

  const answerQuiz = async opt => {
    setAnswered(opt);
    const stored = await dbGetSetting("quiz");
    if (stored) await dbPutSetting("quiz", { ...stored, answered:opt });
  };

  if (!ready) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:16,background:"#0d1a0f"}}>
      <div style={{fontSize:42}}>📖</div>
      <div style={{color:"#c9a84c",fontFamily:"Georgia,serif",fontSize:17}}>Loading…</div>
    </div>
  );

  return (
    <div style={{background:"#0d1a0f",minHeight:"100vh",fontFamily:"'Segoe UI',system-ui,sans-serif",position:"relative"}}>
      <PatternBg/>
      {toast && <div style={{position:"fixed",top:18,left:"50%",transform:"translateX(-50%)",
        background:toast.type==="info"?"#1a3a5c":"#14532d",color:"#faf7f0",padding:"9px 22px",
        borderRadius:12,fontSize:13,fontWeight:600,zIndex:300,boxShadow:"0 4px 20px rgba(0,0,0,0.5)",
        whiteSpace:"nowrap"}}>{toast.msg}</div>}

      <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column",position:"relative",zIndex:1}}>

        {/* Header */}
        <header style={{background:"linear-gradient(135deg,#0d2a18,#0d1a0f)",borderBottom:"1px solid rgba(201,168,76,0.18)",padding:"14px 18px",position:"sticky",top:0,zIndex:10}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <div style={{fontFamily:"Georgia,serif",fontSize:21,color:"#c9a84c",letterSpacing:1}}>حِفْظُ القُرآن</div>
              <div style={{fontSize:10,color:"#6b7280",letterSpacing:2,marginTop:1}}>HIFDH COMPANION</div>
            </div>
            <div style={{textAlign:"center",background:"rgba(201,168,76,0.08)",borderRadius:10,padding:"6px 14px",border:"1px solid rgba(201,168,76,0.15)"}}>
              <div style={{fontSize:10,color:"#c9a84c",letterSpacing:1}}>MEMORIZED</div>
              <div style={{fontSize:26,fontWeight:700,color:"#faf7f0",lineHeight:1}}>{nums.length}</div>
              <div style={{fontSize:10,color:"#a89060"}}>of 114</div>
            </div>
          </div>
        </header>

        <div style={{flex:1,overflowY:"auto",paddingBottom:72}}>
          {tab==="home" && <HomeTab nums={nums} due={due} mem={mem} quiz={quiz} loading={loading}
            answered={answered} reviewNum={reviewNum} reviewDone={reviewDone}
            onStartReview={n=>{setReviewNum(n);setReviewDone(null);}}
            onDoReview={doReview}
            onFinishReview={()=>{setReviewNum(null);setReviewDone(null);}}
            onGenQuiz={genQuiz} onAnswer={answerQuiz}/>}
          {tab==="surahs" && <SurahsTab mem={mem} search={search} setSearch={setSearch}
            juzF={juzF} setJuzF={setJuzF} onAdd={addSurah} onRemove={removeSurah}/>}
          {tab==="stats"  && <StatsTab mem={mem} nums={nums} due={due}/>}
        </div>

        {/* Nav */}
        <nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#0d1a0f",borderTop:"1px solid rgba(255,255,255,0.07)",display:"flex",zIndex:20}}>
          {[{id:"home",icon:"🏠",label:"Home"},{id:"surahs",icon:"📖",label:"Surahs"},{id:"stats",icon:"📊",label:"Progress"}].map(({id,icon,label})=>(
            <button key={id} onClick={()=>setTab(id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"9px 0 11px",background:"transparent",border:"none",cursor:"pointer",color:tab===id?"#c9a84c":"#6b7280",borderTop:tab===id?"2px solid #c9a84c":"2px solid transparent"}}>
              <span style={{fontSize:19}}>{icon}</span>
              <span style={{fontSize:10,letterSpacing:0.5}}>{label}</span>
            </button>
          ))}
        </nav>
      </div>
    </div>
  );
}

// ── Home Tab ──────────────────────────────────────────────────────────────────
function HomeTab({nums,due,mem,quiz,loading,answered,reviewNum,reviewDone,onStartReview,onDoReview,onFinishReview,onGenQuiz,onAnswer}) {
  const typeLabel = {next_verse:"Next Verse",identify_surah:"Identify Surah",surah_meaning:"Surah Meaning",creative:"Trivia"};

  if (reviewNum) {
    const s=SURAHS[reviewNum-1];
    return (
      <div style={{padding:"22px 18px"}}>
        <div style={{background:"linear-gradient(135deg,#0d2a18,#0d1a0f)",border:"1px solid rgba(201,168,76,0.25)",borderRadius:20,padding:22}}>
          <div style={{textAlign:"center",marginBottom:18}}>
            <div style={{fontSize:34,marginBottom:4}}>🎙️</div>
            <div style={{fontFamily:"Georgia,serif",color:"#c9a84c",fontSize:12,letterSpacing:2,marginBottom:6}}>NOW RECITING</div>
            <div style={{fontSize:36,fontFamily:"Georgia,serif",color:"#faf7f0",marginBottom:4}}>{s.ar}</div>
            <div style={{fontSize:20,fontWeight:700,color:"#faf7f0"}}>{s.en}</div>
            <div style={{fontSize:12,color:"#9ca3af",marginTop:4}}>"{s.meaning}" · {s.v} verses · Juz {s.j}</div>
          </div>
          {!reviewDone ? (
            <>
              <div style={{background:"rgba(201,168,76,0.07)",borderRadius:12,padding:14,marginBottom:18,border:"1px solid rgba(201,168,76,0.12)"}}>
                <p style={{color:"#d1d5db",fontSize:13,lineHeight:1.7,margin:0}}>Recite from memory. Rate your recall when done:</p>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
                {[{l:"Perfect 🌟",q:5,bg:"#14532d",b:"#22c55e"},{l:"Good 👍",q:4,bg:"#1e3a5f",b:"#3b82f6"},
                  {l:"Hesitant 😐",q:3,bg:"#3f2a00",b:"#f59e0b"},{l:"Difficult 😓",q:2,bg:"#4a1515",b:"#ef4444"},
                  {l:"Forgot 😔",q:0,bg:"#2d1515",b:"#b91c1c"}].map(({l,q,bg,b})=>(
                  <button key={q} onClick={()=>onDoReview(reviewNum,q)}
                    style={{background:bg,border:`1px solid ${b}`,borderRadius:10,padding:"11px 6px",color:"#faf7f0",fontSize:13,cursor:"pointer",fontWeight:600,gridColumn:q===0?"span 2":undefined}}>
                    {l}
                  </button>
                ))}
              </div>
            </>
          ) : (
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:44,marginBottom:10}}>{reviewDone.q>=4?"🌟":reviewDone.q>=3?"👍":"💪"}</div>
              <div style={{color:"#faf7f0",fontSize:16,fontWeight:700,marginBottom:6}}>
                {reviewDone.q>=4?"Excellent!":reviewDone.q>=3?"Well done!":"Keep practising!"}
              </div>
              <div style={{color:"#9ca3af",fontSize:13,marginBottom:22}}>
                Next review in <span style={{color:"#c9a84c",fontWeight:700}}>{reviewDone.interval} day{reviewDone.interval>1?"s":""}</span> · {reviewDone.next}
              </div>
              <button onClick={onFinishReview} style={G.goldBtn}>Done ✓</button>
            </div>
          )}
        </div>
      </div>
    );
  }

  return (
    <div style={{padding:"18px",display:"flex",flexDirection:"column",gap:18}}>

      {/* Due Today */}
      <section>
        <div style={G.sec}>
          <span>📅</span> Due Today
          <span style={{marginLeft:"auto",background:"#c9a84c",color:"#0d1a0f",borderRadius:12,padding:"2px 10px",fontSize:12,fontWeight:700}}>{due.length}</span>
        </div>
        {nums.length===0 ? (
          <div style={G.empty}>
            <div style={{fontSize:38,marginBottom:10}}>📚</div>
            <div style={{color:"#9ca3af",fontSize:13,textAlign:"center",lineHeight:1.7}}>Go to the Surahs tab to mark which ones you've memorised.</div>
          </div>
        ) : due.length===0 ? (
          <div style={G.empty}>
            <div style={{fontSize:36,marginBottom:8}}>✅</div>
            <div style={{color:"#6ee7b7",fontWeight:600,fontSize:14}}>All caught up!</div>
            <div style={{color:"#9ca3af",fontSize:12,marginTop:3}}>No revisions due. Bārakallāhu fīk.</div>
          </div>
        ) : due.map(n => {
          const s=SURAHS[n-1], c=mem[n];
          return (
            <div key={n} style={{...G.row,marginBottom:9}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontFamily:"Georgia,serif",fontSize:18,color:"#c9a84c"}}>{s.ar}</span>
                  <span style={{color:"#faf7f0",fontWeight:600,fontSize:14}}>{s.en}</span>
                </div>
                <div style={{color:"#6b7280",fontSize:11,marginTop:2}}>{s.v}v · Rep {c.reps||0} · "{s.meaning}"</div>
              </div>
              <button onClick={()=>onStartReview(n)} style={{background:"rgba(201,168,76,0.15)",border:"1px solid rgba(201,168,76,0.3)",borderRadius:9,padding:"7px 13px",color:"#c9a84c",fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>
                Recite →
              </button>
            </div>
          );
        })}
      </section>

      {/* Coming Up */}
      {nums.length>0 && (()=>{
        const up = nums.filter(n=>mem[n].nextReview&&mem[n].nextReview>todayStr())
          .sort((a,b)=>mem[a].nextReview.localeCompare(mem[b].nextReview)).slice(0,3);
        if (!up.length) return null;
        return (
          <section>
            <div style={G.sec}><span>🔜</span> Coming Up</div>
            {up.map(n=>(
              <div key={n} style={{...G.row,opacity:0.7,marginBottom:8}}>
                <div style={{flex:1}}>
                  <span style={{color:"#faf7f0",fontSize:13}}>{SURAHS[n-1].en}</span>
                  <span style={{color:"#c9a84c",fontSize:12,marginLeft:8}}>({SURAHS[n-1].ar})</span>
                </div>
                <span style={{color:"#6b7280",fontSize:12}}>in {daysUntil(mem[n].nextReview)}d</span>
              </div>
            ))}
          </section>
        );
      })()}

      {/* Quiz */}
      <section>
        <div style={G.sec}><span>🧠</span> Daily Question</div>
        {nums.length===0 ? (
          <div style={G.qCard}><div style={{color:"#6b7280",fontSize:13,textAlign:"center",padding:"10px 0"}}>Add memorised surahs to unlock questions.</div></div>
        ) : loading ? (
          <div style={G.qCard}>
            <div style={{textAlign:"center",padding:"20px 0"}}>
              <div style={{fontSize:28,display:"inline-block",animation:"spin 1s linear infinite"}}>⚡</div>
              <div style={{color:"#c9a84c",fontFamily:"Georgia,serif",fontSize:13,marginTop:10}}>Fetching verse data…</div>
              <div style={{color:"#6b7280",fontSize:11,marginTop:4}}>alquran.cloud · Hilali & Khan</div>
            </div>
          </div>
        ) : quiz && !quiz.error ? (
          <div style={G.qCard}>
            <div style={{marginBottom:12}}>
              <span style={{background:"rgba(201,168,76,0.13)",color:"#c9a84c",fontSize:10,padding:"3px 9px",borderRadius:20,letterSpacing:1,fontWeight:700,textTransform:"uppercase"}}>
                {typeLabel[quiz.type]||quiz.type}
              </span>
            </div>
            <p style={{color:"#faf7f0",fontSize:14,fontWeight:500,lineHeight:1.7,marginBottom:14,whiteSpace:"pre-wrap"}}>{quiz.question}</p>
            <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:14}}>
              {Object.entries(quiz.options||{}).map(([k,v])=>{
                if (!v) return null;
                const isCor=quiz.answer===k, isChos=answered===k;
                let bg="rgba(255,255,255,0.04)",brd="rgba(255,255,255,0.1)",col="#d1d5db";
                if (answered) {
                  if (isCor)  { bg="rgba(34,197,94,0.12)"; brd="#22c55e"; col="#6ee7b7"; }
                  else if (isChos) { bg="rgba(239,68,68,0.12)"; brd="#ef4444"; col="#fca5a5"; }
                }
                return (
                  <button key={k} disabled={!!answered} onClick={()=>onAnswer(k)}
                    style={{background:bg,border:`1px solid ${brd}`,borderRadius:9,padding:"10px 12px",textAlign:"left",color:col,cursor:answered?"default":"pointer",fontSize:13,lineHeight:1.5,display:"flex",gap:8,alignItems:"flex-start"}}>
                    <span style={{fontWeight:700,minWidth:16,color:"#c9a84c"}}>{k.toUpperCase()}.</span>
                    <span style={{flex:1}}>{v}</span>
                    {answered&&isCor&&<span>✓</span>}
                    {answered&&isChos&&!isCor&&<span>✗</span>}
                  </button>
                );
              })}
            </div>
            {answered && (
              <div style={{background:"rgba(201,168,76,0.07)",border:"1px solid rgba(201,168,76,0.18)",borderRadius:9,padding:"11px 13px",marginBottom:14}}>
                <div style={{fontSize:10,color:"#c9a84c",letterSpacing:1,marginBottom:3}}>EXPLANATION</div>
                <div style={{color:"#d1d5db",fontSize:13,lineHeight:1.6}}>{quiz.explanation}</div>
              </div>
            )}
            <button onClick={onGenQuiz} style={{...G.goldBtn,fontSize:13,padding:"9px 18px"}}>
              {answered?"New Question →":"Refresh"}
            </button>
          </div>
        ) : (
          <div style={G.qCard}>
            {quiz?.error && <p style={{color:"#fca5a5",fontSize:12,marginBottom:12}}>{quiz.question}</p>}
            <div style={{textAlign:"center",padding:"8px 0"}}>
              <div style={{fontSize:34,marginBottom:10}}>🎯</div>
              <p style={{color:"#9ca3af",fontSize:13,lineHeight:1.7,marginBottom:4}}>Test your knowledge with a question from your memorised surahs.</p>
              <p style={{color:"#6b7280",fontSize:11,marginBottom:16}}>Uses verified Hilali & Khan translation · Free · No login</p>
              <button onClick={onGenQuiz} style={G.goldBtn}>Generate Question ✨</button>
            </div>
          </div>
        )}
      </section>
    </div>
  );
}

// ── Surahs Tab ────────────────────────────────────────────────────────────────
function SurahsTab({mem,search,setSearch,juzF,setJuzF,onAdd,onRemove}) {
  const [confirm,setConfirm] = useState(null);
  const [showAll,setShowAll] = useState(false);
  const filtered = SURAHS.filter(s=>
    (!search || s.en.toLowerCase().includes(search.toLowerCase()) || s.ar.includes(search) ||
      s.meaning.toLowerCase().includes(search.toLowerCase()) || String(s.n).includes(search)) &&
    (!juzF || s.j===juzF)
  );
  const shown = showAll ? filtered : filtered.slice(0,30);
  return (
    <div style={{padding:"18px",display:"flex",flexDirection:"column",gap:14}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name, meaning, or number…"
        style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:11,padding:"11px 14px",color:"#faf7f0",fontSize:13,width:"100%",outline:"none"}}/>
      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
        {[null,...Array.from({length:30},(_,i)=>i+1)].map(j=>(
          <button key={j??'all'} onClick={()=>setJuzF(j)} style={{fontSize:11,padding:"4px 9px",borderRadius:20,cursor:"pointer",fontWeight:600,whiteSpace:"nowrap",background:juzF===j?"#c9a84c":"rgba(255,255,255,0.05)",color:juzF===j?"#0d1a0f":"#9ca3af",border:juzF===j?"1px solid #c9a84c":"1px solid rgba(255,255,255,0.1)"}}>
            {j===null?"All":`J${j}`}
          </button>
        ))}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {shown.map(s=>{
          const m=!!mem[s.n], c=mem[s.n], isDue=m&&(!c.nextReview||c.nextReview<=todayStr());
          return (
            <div key={s.n} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:11,padding:"11px 12px",display:"flex",alignItems:"center",gap:9,borderLeft:m?"3px solid #c9a84c":"3px solid transparent"}}>
              <div style={{minWidth:26,height:26,borderRadius:7,background:"rgba(201,168,76,0.1)",display:"flex",alignItems:"center",justifyContent:"center",color:"#c9a84c",fontSize:11,fontWeight:700}}>{s.n}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"baseline",gap:7,flexWrap:"wrap"}}>
                  <span style={{color:"#faf7f0",fontWeight:600,fontSize:13}}>{s.en}</span>
                  <span style={{color:"#c9a84c",fontFamily:"Georgia,serif",fontSize:15}}>{s.ar}</span>
                </div>
                <div style={{color:"#6b7280",fontSize:11,marginTop:2}}>
                  {s.meaning} · {s.v}v · Juz {s.j}
                  {m&&c&&<span style={{color:isDue?"#f59e0b":"#6ee7b7",marginLeft:5}}>{isDue?"· Due ⚡":`· ${c.nextReview}`}</span>}
                </div>
              </div>
              {m ? (
                <button onClick={()=>{if(confirm===s.n){onRemove(s.n);setConfirm(null);}else{setConfirm(s.n);setTimeout(()=>setConfirm(x=>x===s.n?null:x),3000);}}}
                  style={{borderRadius:7,padding:"5px 9px",fontSize:11,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",border:"1px solid",color:confirm===s.n?"#fca5a5":"#6b7280",background:confirm===s.n?"#7f1d1d":"transparent",borderColor:confirm===s.n?"#ef4444":"#374151"}}>
                  {confirm===s.n?"Confirm?":"✓ Mem."}
                </button>
              ) : (
                <button onClick={()=>onAdd(s.n)} style={{background:"rgba(201,168,76,0.1)",border:"1px solid rgba(201,168,76,0.25)",borderRadius:7,padding:"5px 10px",color:"#c9a84c",fontSize:11,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>+ Add</button>
              )}
            </div>
          );
        })}
      </div>
      {filtered.length>30&&!showAll&&<button onClick={()=>setShowAll(true)} style={G.goldBtn}>Show all {filtered.length} results</button>}
      {filtered.length===0&&<div style={{textAlign:"center",color:"#6b7280",padding:"36px 0",fontSize:13}}>No surahs found.</div>}
    </div>
  );
}

// ── Stats Tab ─────────────────────────────────────────────────────────────────
function StatsTab({mem,nums,due}) {
  const totalV   = nums.reduce((a,n)=>a+SURAHS[n-1].v,0);
  const juzSet   = [...new Set(nums.map(n=>SURAHS[n-1].j))].length;
  const avgInt   = nums.length ? Math.round(nums.reduce((a,n)=>a+(mem[n].interval||1),0)/nums.length) : 0;
  const byJuz    = {};
  nums.forEach(n=>{ const j=SURAHS[n-1].j; byJuz[j]=(byJuz[j]||0)+1; });

  return (
    <div style={{padding:"18px",display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {[{l:"Surahs",v:nums.length,s:"memorised",i:"📖"},{l:"Verses",v:totalV,s:"committed",i:"✍️"},
          {l:"Due Today",v:due.length,s:"to review",i:"⚡"},{l:"Juz",v:juzSet,s:"covered",i:"🗂️"}].map(({l,v,s,i})=>(
          <div key={l} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:14,padding:16,textAlign:"center"}}>
            <div style={{fontSize:26,marginBottom:3}}>{i}</div>
            <div style={{fontSize:30,fontWeight:800,color:"#c9a84c",lineHeight:1}}>{v}</div>
            <div style={{fontSize:12,color:"#faf7f0",fontWeight:600,marginTop:2}}>{l}</div>
            <div style={{fontSize:10,color:"#6b7280"}}>{s}</div>
          </div>
        ))}
      </div>
      <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:14,padding:16}}>
        <div style={G.sec}><span>📈</span> Overall Progress</div>
        <div style={{background:"rgba(255,255,255,0.05)",borderRadius:8,height:10,overflow:"hidden",margin:"10px 0"}}>
          <div style={{background:"linear-gradient(90deg,#c9a84c,#f0c040)",height:"100%",width:`${(nums.length/114)*100}%`,borderRadius:8}}/>
        </div>
        <div style={{color:"#9ca3af",fontSize:12,textAlign:"right"}}>{nums.length}/114 · {Math.round(nums.length/114*100)}%</div>
      </div>
      {Object.keys(byJuz).length>0&&(
        <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:14,padding:16}}>
          <div style={G.sec}><span>🗂️</span> By Juz</div>
          <div style={{display:"flex",flexDirection:"column",gap:7,marginTop:10}}>
            {Object.entries(byJuz).sort((a,b)=>Number(a[0])-Number(b[0])).map(([j,cnt])=>{
              const total=SURAHS.filter(s=>s.j===Number(j)).length;
              return (
                <div key={j}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                    <span style={{color:"#d1d5db",fontSize:12}}>Juz {j}</span>
                    <span style={{color:"#c9a84c",fontSize:12}}>{cnt}/{total}</span>
                  </div>
                  <div style={{background:"rgba(255,255,255,0.05)",borderRadius:4,height:5}}>
                    <div style={{background:"#c9a84c",height:"100%",borderRadius:4,width:`${cnt/total*100}%`}}/>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
      {nums.length>0&&(
        <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:14,padding:16}}>
          <div style={G.sec}><span>🔄</span> SM-2 Health</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:10}}>
            <div style={{textAlign:"center"}}><div style={{fontSize:22,fontWeight:700,color:"#c9a84c"}}>{avgInt}d</div><div style={{fontSize:11,color:"#6b7280"}}>avg interval</div></div>
            <div style={{textAlign:"center"}}><div style={{fontSize:22,fontWeight:700,color:"#6ee7b7"}}>{nums.filter(n=>(mem[n].reps||0)>=3).length}</div><div style={{fontSize:11,color:"#6b7280"}}>well-established</div></div>
          </div>
        </div>
      )}
      {nums.length===0&&<div style={G.empty}><div style={{fontSize:36,marginBottom:10}}>📊</div><div style={{color:"#9ca3af",fontSize:13,textAlign:"center"}}>Stats appear once you add memorised surahs.</div></div>}
    </div>
  );
}

// ── Shared styles ─────────────────────────────────────────────────────────────
const G = {
  goldBtn: {background:"linear-gradient(135deg,#c9a84c,#e8c55a)",color:"#0d1a0f",border:"none",borderRadius:11,padding:"11px 22px",fontSize:14,fontWeight:700,cursor:"pointer",width:"100%"},
  sec:     {display:"flex",alignItems:"center",gap:7,color:"#c9a84c",fontSize:12,fontWeight:700,letterSpacing:1,marginBottom:10,textTransform:"uppercase"},
  empty:   {background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:14,padding:"26px 18px",display:"flex",flexDirection:"column",alignItems:"center",textAlign:"center"},
  row:     {background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"12px 14px",display:"flex",alignItems:"center",gap:10},
  qCard:   {background:"rgba(255,255,255,0.03)",border:"1px solid rgba(201,168,76,0.14)",borderRadius:16,padding:18},
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    const sw = `const C="hifdh-v1";self.addEventListener("install",e=>e.waitUntil(caches.open(C).then(c=>c.add("/")).then(()=>self.skipWaiting())));self.addEventListener("activate",e=>e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>self.clients.claim())));self.addEventListener("fetch",e=>{if(e.request.url.includes("alquran.cloud")||e.request.url.includes("cdnjs"))return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>r)));});`;

  });
}
